<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>GPS VR Test</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #unity-canvas {
      position:fixed; top:0; left:0;
      width:100% !important; height:100% !important;
    }

    #start-screen {
      position:fixed; inset:0; z-index:200; background:#111;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:20px; padding:40px; text-align:center;
    }
    #start-screen h2 { font:bold 22px monospace; color:#00ff88; letter-spacing:3px; }
    #start-screen p  { font:13px monospace; color:#888; line-height:1.8; }
    #start-btn {
      background:#00ff88; color:#000; border:none; border-radius:12px;
      padding:16px 48px; font:bold 18px monospace; cursor:pointer;
    }
    #start-status { font:12px monospace; color:#555; min-height:18px; }

    #loading-overlay {
      position:fixed; inset:0; z-index:100; background:#111;
      display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      transition:opacity 0.5s;
    }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }
    .ld-title { font:bold 20px monospace; color:#00ff88; letter-spacing:4px; }
    .ld-bar-w { width:220px; height:3px; background:#222; border-radius:2px; overflow:hidden; }
    .ld-bar   { height:100%; width:0; background:linear-gradient(90deg,#00ff88,#00cfff); transition:width .3s; }
    .ld-pct   { font:13px monospace; color:#00ff88; }
  </style>
</head>
<body>
  <canvas id="unity-canvas"></canvas>

  <div id="start-screen">
    <h2>GPS · VR · TEST</h2>
    <p>Toca para iniciar.<br><br>
       Se pedirá permiso para:<br>
       📍 Ubicación GPS<br>
       🔄 Giroscopio / Orientación
    </p>
    <button id="start-btn" onclick="onStart()">INICIAR</button>
    <div id="start-status"></div>
  </div>

  <div id="loading-overlay">
    <div class="ld-title">CARGANDO</div>
    <div class="ld-bar-w"><div class="ld-bar" id="progress-bar"></div></div>
    <div class="ld-pct" id="loading-percent">0%</div>
  </div>

  <script src="Build/EXPORT.loader.js"></script>
  <script>
    var unityInstance = null;

    function onStart() {
      document.getElementById('start-btn').disabled = true;
      document.getElementById('start-status').textContent = 'Iniciando...';

      // iOS 13+: pedir permiso de giroscopio con el gesto del usuario
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(function(state) {
            document.getElementById('start-status').textContent =
              'Giroscopio: ' + state;
            loadUnity();
          })
          .catch(function(e) {
            document.getElementById('start-status').textContent =
              'Giroscopio denegado. Cargando igual...';
            loadUnity();
          });
      } else {
        // Android / otros — no necesita permiso
        loadUnity();
      }
    }

    function loadUnity() {
      document.getElementById('start-screen').style.display = 'none';
      var ov = document.getElementById('loading-overlay');
      ov.style.display = 'flex';

      createUnityInstance(document.getElementById('unity-canvas'), {
        dataUrl:            'Build/EXPORT.data',
        frameworkUrl:       'Build/EXPORT.framework.js',
        codeUrl:            'Build/EXPORT.wasm',
        streamingAssetsUrl: 'StreamingAssets',
        companyName:        'DefaultCompany',
        productName:        'GPS_AR_Test_game',
        productVersion:     '0.1',
      }, function(progress) {
        var pct = Math.round(progress * 100);
        document.getElementById('progress-bar').style.width    = pct + '%';
        document.getElementById('loading-percent').textContent = pct + '%';
      })
      .then(function(instance) {
        unityInstance = instance;
        ov.classList.add('hidden');
        setTimeout(function() { ov.style.display = 'none'; }, 600);
      })
      .catch(function(err) {
        document.getElementById('loading-percent').textContent = 'Error: ' + err;
        console.error(err);
      });
    }

    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
